services:
  - type: web
    name: stock-price-tracker
    env: python
    pythonVersion: "3.11.8"
    buildCommand: python -m pip install --upgrade pip setuptools wheel && python -m pip install --only-binary :all: -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT
    envVars:
      - key: FLASK_ENV
        value: production